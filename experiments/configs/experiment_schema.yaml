# Comprehensive Experiment Configuration Schema
# This schema defines all possible parameters for configurable multi-agent negotiation experiments

schema_version: "1.0"
description: "Complete schema for parameterized multi-agent negotiation experiments"

# ==== ENVIRONMENT PARAMETERS ====
environment:
  # Core negotiation parameters
  n_agents: 3           # Number of agents (n)
  m_items: 5           # Number of items to allocate (m) 
  t_rounds: 6          # Maximum number of negotiation rounds (t)
  gamma_discount: 0.9  # Discount factor (γ) for utility calculations
  
  # Environment behavior settings
  randomized_proposal_order: true  # Whether to randomize speaking order each round
  require_unanimous_consensus: true  # Whether all agents must agree for consensus
  allow_partial_allocations: false  # Whether items can be split between agents
  
  # Termination conditions
  max_conversation_turns_per_round: 10  # Max discussion exchanges per round
  timeout_minutes: 30  # Overall experiment timeout

# ==== MODEL CONFIGURATION ====
models:
  # Provider configurations with rate limiting
  providers:
    openai:
      provider: "openai"
      base_url: null  # Use default API endpoint
      api_key_env: "OPENAI_API_KEY"
      requests_per_minute: 30
      tokens_per_minute: 50000
      max_retries: 3
      retry_delay: 2.0
      exponential_backoff: true
      connect_timeout: 15.0
      read_timeout: 45.0
    
    anthropic:
      provider: "anthropic"
      base_url: null
      api_key_env: "ANTHROPIC_API_KEY" 
      requests_per_minute: 60
      tokens_per_minute: 100000
      max_retries: 3
      retry_delay: 1.0
      exponential_backoff: true
      connect_timeout: 10.0
      read_timeout: 30.0
    
    openrouter:
      provider: "openrouter"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      requests_per_minute: 100
      tokens_per_minute: 200000
      max_retries: 3
      retry_delay: 1.0
      exponential_backoff: true
      connect_timeout: 10.0
      read_timeout: 30.0
    
    local_cluster:
      provider: "local"
      base_path: "/scratch/gpfs/DANQIC/models/"
      gpu_allocation: "1"  # Number of GPUs to request
      memory_gb: 16
      timeout_minutes: 60

  # Available model definitions
  available_models:
